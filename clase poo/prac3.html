<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie Numérica con Validación</title>
    <link rel="stylesheet" href="prac3.css">
</head>
<body>
<div class="main-wrapper">
    <div class="container">
        <h2>Serie Numérica</h2>
        <label>Ingresa un número entero positivo:</label>
        <input type="number" id="numero">
        <button onclick="procesarNumero()">Procesar</button>
        <div id="resultado"></div>
    </div>
    
    <div class="container">
        <h2>Sumatoria</h2>
        <label>Ingresa un número:</label>
        <input type="number" id="num1">
        <button onclick="sumatoria()">Calcular</button>
        <div id="res1"></div>
    </div>

    <div class="container">
        <h2>Factorial</h2>
        <label>Ingresa un número:</label>
        <input type="number" id="num2">
        <button onclick="factorial()">Calcular</button>
        <div id="res2"></div>
    </div>
</div>
<script src="prac3.js"></script>
</body>
</html>
